
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>AI Resume Analyzer</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6fa;
font-family:Arial, Helvetica, sans-serif;
}

.sidebar{
height:100vh;
background:white;
padding:20px;
border-right:1px solid #ddd;
overflow-y:auto;
}

.main{
padding:40px;
}

.card{
border-radius:15px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
}

.score{
font-size:40px;
font-weight:bold;
color:#28a745;
}

.chart-box{
width:250px;
margin:auto;
}

h2{
font-weight:600;
}

</style>

</head>


<body>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3 sidebar">

<h4 class="mb-4">Previous Resumes</h4>

<ul class="list-group">

{% for r in history %}

<li class="list-group-item d-flex justify-content-between align-items-center">

{{ r[0] }}

<span class="badge bg-primary rounded-pill">
{{ r[1] }}
</span>

</li>

{% endfor %}

</ul>

</div>



<!-- MAIN CONTENT -->
<div class="col-md-9 main">

<h2 class="mb-4">AI Resume Analyzer</h2>


<!-- Upload Form -->
<div class="card p-4 mb-4">

<form method="POST" enctype="multipart/form-data">

<label class="form-label">Upload Resume (PDF / DOCX / DOC)</label>

<input type="file"
name="resume"
class="form-control mb-3"
accept=".pdf,.doc,.docx"
required>


<label class="form-label">Enter Keywords (comma separated)</label>

<input type="text"
name="keywords"
class="form-control mb-3"
placeholder="python, machine learning, flask, sql, data science"
required>


<button class="btn btn-success">
Analyze Resume
</button>

</form>

</div>



{% if score %}

<!-- Result Card -->
<div class="card p-4">

<h4>{{ filename }}</h4>

<div class="score">
Score : {{ score }}/100
</div>

<br>


<!-- Small Pie Chart -->
<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<br>

<h5>Resume Summary</h5>

<p>{{ summary }}</p>

</div>


<script>

var ctx = document.getElementById('chart');

new Chart(ctx, {

type:'pie',

data:{
labels:['Matched Keywords','Missing Keywords'],
datasets:[{
data:[{{matched}}, {{missing}}]
}]
},

options:{
responsive:false,
plugins:{
legend:{
position:'bottom'
}
}
}

});

</script>

{% endif %}



</div>

</div>

</div>

</body>
</html>
